name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate Framework
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          REQUIRED_FILES=("README.md" "CHANGELOG.md" "LICENSE" "CLAUDE.md" "CONTRIBUTING.md" ".gitignore")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done
          echo "✅ All required files present"

      - name: Validate skills structure
        run: |
          REQUIRED_SKILLS=("context.md" "spec.md" "estimate.md" "plan.md" "implement.md" "fix.md" "debug.md" "refactor.md" "review.md" "status.md" "reflect.md" "learn.md" "socrates.md")
          SKILLS_DIR="cli/templates/.claude/sda/skills"
          
          for skill in "${REQUIRED_SKILLS[@]}"; do
            if [ ! -f "$SKILLS_DIR/$skill" ]; then
              echo "❌ Missing required skill: $SKILLS_DIR/$skill"
              exit 1
            fi
          done
          echo "✅ All 13 required skills present"

      - name: Validate knowledge base
        run: |
          KB_FILES=("patterns.md" "heuristics.md" "antipatterns.md" "changelog.md")
          KB_DIR="cli/templates/.claude/sda/knowledge"
          
          for file in "${KB_FILES[@]}"; do
            if [ ! -f "$KB_DIR/$file" ]; then
              echo "❌ Missing knowledge base file: $KB_DIR/$file"
              exit 1
            fi
          done
          echo "✅ Knowledge base complete"

      - name: Check CLAUDE.md structure
        run: |
          # Check for required sections
          SECTIONS=("IDENTIDADE" "FLUXO OBRIGATÓRIO" "HOOKS" "SKILLS" "SUBAGENTS")
          
          for section in "${SECTIONS[@]}"; do
            if ! grep -q "$section" CLAUDE.md; then
              echo "❌ Missing section in CLAUDE.md: $section"
              exit 1
            fi
          done
          echo "✅ CLAUDE.md structure valid"

      - name: Check for hardcoded credentials (high-confidence patterns)
        run: |
          # Padrões de token reais (alta confiança, poucos falsos positivos)
          PATTERN='npm_[A-Za-z0-9]{36}|ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|sk-ant-[A-Za-z0-9-]{20,}|sk-[A-Za-z0-9]{32,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----'
          MATCHES=$(grep -rInE "$PATTERN" \
            --include="*.js" --include="*.sh" --include="*.md" \
            --include="*.yml" --include="*.yaml" --include="*.json" \
            --exclude-dir=.git --exclude-dir=node_modules . || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Possível credencial real encontrada no código:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ Nenhum padrão de credencial real encontrado"

      - name: Check no secrets in code (heuristic, non-blocking)
        run: |
          if grep -rIn "password\|secret\|api_key\|token" \
            --include="*.md" --include="*.yml" --include="*.yaml" --include="*.js" --include="*.sh" \
            --exclude-dir=.git --exclude-dir=node_modules . \
            | grep -v "CHANGELOG\|README\|CONTRIBUTING\|.github/workflows" \
            | grep -v "GITHUB_TOKEN\|secrets\.\|NODE_AUTH_TOKEN" | head -10; then
            echo "⚠️ Termos suspeitos encontrados — revisar manualmente (não bloqueia o build)"
          else
            echo "✅ Nenhum termo suspeito detectado"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run CLI tests
        run: node cli/test.js

      - name: Count framework metrics
        run: |
          SKILLS=$(ls -1 cli/templates/.claude/sda/skills/*.md 2>/dev/null | wc -l)
          LINES=$(wc -l < CLAUDE.md)
          echo "📊 Framework Metrics:"
          echo "   Skills: $SKILLS"
          echo "   CLAUDE.md lines: $LINES"
          echo "   Status: ✅ Valid"
